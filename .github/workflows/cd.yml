on:
  push:
    branches: [main]

jobs:
  style:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Build app
        run: ./scripts/buildprod.sh

      - name: DB migration
        run: ./scripts/migrateup.sh 

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
          project_id: notely-501315

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Verify gcloud auth
        run: gcloud auth list --filter=status:ACTIVE --format="value(account)"

      - name: Build and push Docker image
        run: |
          gcloud builds submit \
          --tag us-central1-docker.pkg.dev/notely-501315/notely-ar-repo/notely:latest \
          .

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-501315/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project notely-501315 --max-instances=4
